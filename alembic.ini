# ===========================================================================
# Alembic Configuration — AI Master Python
# ===========================================================================
# The sqlalchemy.url below is a placeholder. At runtime, alembic/env.py
# reads DATABASE_URL from pydantic-settings so you never need to duplicate
# the connection string here.
# ===========================================================================

[alembic]
# Path to the directory containing env.py and the versions/ folder
script_location = alembic

# Template used when generating new revision files.
# Produces filenames like: 20240601_a1b2c3d4_add_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use for file_template date fields (UTC recommended)
timezone = UTC

# Truncate the "slug" portion of the filename to this many characters
truncate_slug_length = 40

# Set to true to run the environment during `alembic history`, etc.
# Normally not needed.
revision_environment = false

# Placeholder — overridden at runtime by env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Run ruff to auto-format generated migration files
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# ---------------------------------------------------------------------------
# Logging — standard Python logging config shipped with Alembic
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
