# ===========================================================================
# AI Master Python — Development Docker Compose Override
# ===========================================================================
# Usage (always specify BOTH files):
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up --build
#
# Or via the Makefile shortcut:
#   make dev
# ===========================================================================

services:
  # ---- API (dev overrides) ----
  api:
    build:
      target: runtime          # still use the slim runtime stage
    environment:
      - DEBUG=true
      - APP_ENV=development
    volumes:
      # Mount the entire project for hot-reload; changes are reflected instantly
      - ..:/home/appuser/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app
    ports:
      - "8000:8000"

  # ---- PostgreSQL (expose to host for local tools) ----
  db:
    ports:
      - "5432:5432"

  # ---- Redis (expose to host for local tools) ----
  redis:
    ports:
      - "6379:6379"

  # ---- pgAdmin (web-based DB management) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aimaster-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@aimaster.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aimaster-net
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgadmin-data:
    driver: local
