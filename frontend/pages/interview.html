<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Simulator — AI Master Python</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css">
  <link rel="stylesheet" href="/frontend/css/layout.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:var(--s-4)">
          <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-title">Interview Simulator</div>
        </div>
      </div>

      <div class="page-content" id="interview-content">
        <div class="card animate-in" style="max-width:600px;margin:0 auto;text-align:center">
          <div style="font-size:3rem;margin-bottom:var(--s-4)">🎯</div>
          <h2 style="margin-bottom:var(--s-3)">Ready for your mock interview?</h2>
          <p style="color:var(--text-secondary);margin-bottom:var(--s-6)">
            Test your Python knowledge with an AI-driven technical interview. 
            You'll get an immediate score and feedback on your answers.
          </p>
          <button class="btn btn-primary" onclick="startInterview()">Start Technical Interview</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/firebase.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/app.js"></script>
  <script>
    let currentInterview = null;

    async function init() {
      await Auth.requireAuth();
      Sidebar.init('interview');
    }

    async function startInterview() {
      const content = document.getElementById('interview-content');
      content.innerHTML = '<div style="text-align:center"><div class="spinner"></div><p>Setting up your interview...</p></div>';
      
      try {
        currentInterview = await API.InterviewApi.create({ interview_type: 'technical', difficulty: 'medium' });
        renderQuestion(currentInterview.questions[0]);
      } catch (err) {
        content.innerHTML = '<p>Error starting interview.</p>';
      }
    }

    function renderQuestion(q) {
      document.getElementById('interview-content').innerHTML = `
        <div class="card animate-in" style="max-width:800px;margin:0 auto">
          <div style="display:flex; gap: var(--s-4); margin-bottom: var(--s-4)">
            <div style="flex:1; background:#000; border-radius:var(--r-md); overflow:hidden; position:relative; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center">
              <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; font-size:0.8rem; color:#fff">AI Interviewer</div>
              <div style="font-size:4rem">🤖</div>
              <div style="position:absolute; bottom:10px; right:10px; display:flex; gap:5px">
                <div style="width:10px; height:10px; background:green; border-radius:50%; animation: pulse 1.5s infinite"></div>
              </div>
            </div>
            <div style="flex:1; background:#111; border-radius:var(--r-md); overflow:hidden; position:relative; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center">
              <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; font-size:0.8rem; color:#fff">You</div>
              <div style="font-size:4rem; color:var(--text-muted)">👤</div>
            </div>
          </div>

          <div class="badge badge-brand" style="margin-bottom:var(--s-4)">Question ${q.order_index}</div>
          <h3 style="margin-bottom:var(--s-4)">${q.question_text}</h3>
          
          <textarea id="answer-box" rows="6" style="width:100%;padding:var(--s-3);border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg-surface);color:var(--text-primary);margin-bottom:var(--s-4)" placeholder="Type your answer here..."></textarea>
          
          <div style="display:flex;justify-content:flex-end">
            <button class="btn btn-primary" onclick="submitAnswer('${q.id}')">Submit Answer</button>
          </div>
        </div>
      `;
    }

    async function submitAnswer(qId) {
      const answer = document.getElementById('answer-box').value.trim();
      if (!answer) return;
      
      const content = document.getElementById('interview-content');
      content.innerHTML = '<div style="text-align:center"><div class="spinner"></div><p>Evaluating answer...</p></div>';
      
      try {
        const result = await API.InterviewApi.submitAnswer(qId, { answer: answer });
        const data = result.data || result;
        
        content.innerHTML = `
          <div class="card animate-in" style="max-width:800px;margin:0 auto">
            <h3 style="margin-bottom:var(--s-4)">Evaluation complete!</h3>
            <div style="font-size:2rem;font-weight:700;color:var(--brand-400);margin-bottom:var(--s-4)">Score: ${data.score} / 10</div>
            
            <div style="background:var(--bg-surface);padding:var(--s-4);border-radius:var(--r-md);margin-bottom:var(--s-4)">
              <strong>AI Feedback:</strong><br>
              ${data.ai_evaluation}
            </div>
            
            <div style="display:flex;justify-content:center">
              <button class="btn btn-primary" onclick="location.reload()">Finish</button>
            </div>
          </div>
        `;
      } catch (err) {
        content.innerHTML = '<p>Error evaluating answer.</p>';
      }
    }

    init();
  </script>
</body>
</html>
