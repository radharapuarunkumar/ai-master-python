<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Simulator — AI Master Python</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css">
  <link rel="stylesheet" href="/frontend/css/layout.css">
  <style>
    .tabs { display: flex; gap: var(--s-2); margin-bottom: var(--s-4); border-bottom: 1px solid var(--border); padding-bottom: var(--s-2); overflow-x: auto; }
    .tab { padding: var(--s-2) var(--s-4); border-radius: var(--r-md); cursor: pointer; color: var(--text-secondary); white-space: nowrap; }
    .tab.active { background: var(--brand-500); color: white; font-weight: 600; }
    .tab:hover:not(.active) { background: var(--bg-surface); }
    
    .interview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-4); margin-bottom: var(--s-4); }
    @media (max-width: 768px) { .interview-grid { grid-template-columns: 1fr; } }
    
    .video-panel { background: #000; border-radius: var(--r-lg); overflow: hidden; aspect-ratio: 16/9; position: relative; }
    .video-panel video { width: 100%; height: 100%; object-fit: cover; }
    .video-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    
    .ai-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--s-4); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; aspect-ratio: 16/9; }
    .ai-avatar { width: 80px; height: 80px; background: var(--brand-600); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: var(--s-4); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(var(--brand-rgb), 0.4); } 70% { box-shadow: 0 0 0 20px rgba(var(--brand-rgb), 0); } 100% { box-shadow: 0 0 0 0 rgba(var(--brand-rgb), 0); } }
    
    .controls-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--s-4); }
    #timer { font-family: monospace; font-size: 1.5rem; color: var(--error); font-weight: bold; text-align: right; margin-bottom: var(--s-2); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:var(--s-4)">
          <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-title">Interview Simulator</div>
        </div>
      </div>

      <div class="page-content">
        
        <div class="tabs" id="interview-tabs">
          <div class="tab active" onclick="switchTab('technical', this)">Technical Interview</div>
          <div class="tab" onclick="switchTab('hr', this)">HR Interview</div>
          <div class="tab" onclick="switchTab('system_design', this)">System Design</div>
          <div class="tab" onclick="switchTab('placement', this)">Mock Placement</div>
        </div>

        <div class="interview-grid">
          <div class="ai-panel">
            <div class="ai-avatar">🤖</div>
            <h3 style="margin-bottom:var(--s-2)">AI Interviewer</h3>
            <p id="ai-question" style="color:var(--text-secondary)">Click 'Start Interview' when you are ready.</p>
          </div>
          <div class="video-panel">
            <video id="user-video" autoplay playsinline muted></video>
            <div class="video-label">You (Camera)</div>
          </div>
        </div>

        <div class="controls-panel">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-3)">
            <h3 id="current-stage">Preparation</h3>
            <div id="timer">00:00</div>
          </div>
          
          <textarea id="answer-box" rows="4" style="width:100%;padding:var(--s-3);background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:var(--s-3)" placeholder="Type your answer here or speak clearly into your microphone..." disabled></textarea>
          
          <div style="display:flex;gap:var(--s-3);align-items:center">
            <button class="btn btn-primary" id="btn-start" onclick="startInterview()">Start Interview</button>
            <button class="btn btn-secondary" id="btn-submit" onclick="submitAnswer()" style="display:none">Submit Answer</button>
            <div id="evaluation-result" style="color:var(--success);font-weight:bold;margin-left:auto"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/firebase.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/app.js"></script>
  <script>
    let timerInterval;
    let currentMode = 'technical';
    let isInterviewing = false;

    const questions = {
      technical: "Explain the difference between a generator and a list comprehension in Python. When would you use each?",
      hr: "Tell me about a time you had a conflict with a team member and how you resolved it.",
      system_design: "How would you design the backend for a scalable URL shortener like bit.ly?",
      placement: "Walk me through your resume and highlight your most significant Python project."
    };

    async function init() {
      await Auth.requireAuth();
      Sidebar.init('interview');
      
      // Request camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('user-video').srcObject = stream;
      } catch (err) {
        console.log("Camera access denied or unavailable.");
      }
    }

    function switchTab(mode, el) {
      if (isInterviewing) {
        if(!confirm("Are you sure you want to switch tabs? This will end the current interview.")) return;
        endInterview();
      }
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentMode = mode;
      
      document.getElementById('ai-question').textContent = "Click 'Start Interview' when you are ready.";
      document.getElementById('evaluation-result').textContent = "";
      document.getElementById('answer-box').value = "";
    }

    function startInterview() {
      isInterviewing = true;
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-submit').style.display = 'block';
      document.getElementById('answer-box').disabled = false;
      document.getElementById('answer-box').focus();
      document.getElementById('current-stage').textContent = "Answering...";
      document.getElementById('evaluation-result').textContent = "";
      
      document.getElementById('ai-question').textContent = questions[currentMode];
      
      // Start 5 min timer
      let timeLeft = 300;
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = "05:00";
      
      timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          submitAnswer();
          return;
        }
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `${m}:${s}`;
      }, 1000);
    }

    function submitAnswer() {
      const ans = document.getElementById('answer-box').value;
      if (!ans.trim() && document.getElementById('timer').textContent !== "00:00") {
        alert("Please provide an answer.");
        return;
      }
      
      endInterview();
      
      document.getElementById('evaluation-result').textContent = "Evaluating...";
      document.getElementById('evaluation-result').style.color = "var(--text-muted)";
      
      setTimeout(() => {
        const score = Math.floor(Math.random() * 20) + 80;
        document.getElementById('evaluation-result').textContent = `Score: ${score}/100. Excellent point!`;
        document.getElementById('evaluation-result').style.color = "var(--success)";
        
        // Mock save progress
        if (window.API && window.API.ProgressApi) {
           window.API.ProgressApi.updateScore('interview', score).catch(e => console.log(e));
        }
      }, 1500);
    }

    function endInterview() {
      isInterviewing = false;
      clearInterval(timerInterval);
      document.getElementById('timer').textContent = "00:00";
      document.getElementById('btn-start').style.display = 'block';
      document.getElementById('btn-start').textContent = 'Try Another Question';
      document.getElementById('btn-submit').style.display = 'none';
      document.getElementById('answer-box').disabled = true;
      document.getElementById('current-stage').textContent = "Completed";
    }

    init();
  </script>
</body>
</html>
