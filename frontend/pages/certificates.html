<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates — AI Master Python</title>
  <link rel="stylesheet" href="/frontend/css/design-system.css">
  <link rel="stylesheet" href="/frontend/css/layout.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:var(--s-4)">
          <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-title">Certificates</div>
        </div>
      </div>

      <div class="page-content">
        <h2 style="margin-bottom:var(--s-4)">My Certificates</h2>
        <div class="grid-2">
          
          <div class="card animate-in">
            <div id="cert-1" style="background:#fff; color:#000; padding:40px; text-align:center; border:10px solid #2980b9; position:relative;">
              <h1 style="color:#2980b9; margin-bottom:10px">Certificate of Completion</h1>
              <p style="font-size:1.2rem; margin-bottom:20px">This certifies that</p>
              <h2 id="student-name" style="font-size:2rem; text-decoration:underline; margin-bottom:20px">[Your Name]</h2>
              <p style="font-size:1.2rem; margin-bottom:20px">has successfully completed</p>
              <h3 style="font-size:1.5rem; color:#c0392b; margin-bottom:30px">Python Basics to Advanced</h3>
              <p style="font-size:0.9rem; color:#7f8c8d">Date: <span id="cert-date"></span></p>
              <p style="font-size:0.9rem; color:#7f8c8d">ID: AIMP-782394</p>
            </div>
            <div style="margin-top:var(--s-4); text-align:center;">
              <button class="btn btn-primary" onclick="exportCert('cert-1')">Download PDF</button>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/firebase.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/app.js"></script>
  <script>
    async function init() {
      await Auth.requireAuth();
      Sidebar.init('certificates');
      
      const user = Auth.currentUser;
      if (user) {
        document.getElementById('student-name').textContent = user.displayName || 'Python Developer';
      }
      document.getElementById('cert-date').textContent = new Date().toLocaleDateString();
    }

    function exportCert(id) {
      const element = document.getElementById(id);
      const opt = {
        margin: 0,
        filename: 'Python_Certificate.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(element).save();
    }

    init();
  </script>
</body>
</html>
